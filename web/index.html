<!DOCTYPE html>
<html lang="es">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta charset="UTF-8">
    <title>AgroClima Pro - Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0f172a; color: #f1f5f9; font-family: 'Inter', sans-serif; }
        .card { background: #1e293b; border: 1px solid #334155; border-radius: 1rem; padding: 1.25rem; }
        .btn-tab { transition: all 0.2s; border: 1px solid transparent; }
        .btn-active { background-color: #3b82f6 !important; color: white !important; border-color: #60a5fa; }
        .btn-model { background: #1e293b; color: #94a3b8; font-size: 10px; font-weight: 800; padding: 8px 12px; border-radius: 8px; border: 1px solid #334155; cursor: pointer; }
        .btn-model-active { color: white; background: #2563eb; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        canvas {touch-action: none; -webkit-tap-highlight-color: transparent; user-select: none;}
    </style>
</head>
<body class="pb-10">

    <div class="sticky top-0 z-50 bg-slate-900/80 backdrop-blur-md border-b border-slate-800 p-4 mb-6">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-4">
                <h1 class="text-xl font-800 italic uppercase text-white">Agro<span class="text-blue-500">Clima</span></h1>
                <select id="selector-lote" onchange="cambiarLote(this.value)" class="bg-slate-800 border border-slate-700 text-blue-400 text-sm font-800 py-1 px-3 rounded-lg outline-none"></select>
                <button onclick="resetAllZooms()" class="bg-slate-700 text-[9px] font-800 px-2 py-1 rounded border border-slate-600 uppercase text-slate-400 hover:text-white">Reset Zoom</button>
            </div>
            <div class="flex gap-2 w-full md:w-auto">
                <button id="tab-resumen" onclick="verSeccion('resumen')" class="btn-tab btn-active flex-1 px-4 py-3 rounded-xl text-[10px] font-800 uppercase tracking-widest">Resumen</button>
                <button id="tab-aire" onclick="verSeccion('aire')" class="btn-tab bg-slate-800 text-slate-500 flex-1 px-4 py-3 rounded-xl text-[10px] font-800 uppercase tracking-widest">Modelos</button>
                <button id="tab-prueba" onclick="verSeccion('prueba')" class="btn-tab bg-slate-800 text-slate-500 flex-1 px-4 py-3 rounded-xl text-[10px] font-800 uppercase tracking-widest text-blue-300">Consenso</button>
            </div>
        </div>
    </div>

    <main class="max-w-6xl mx-auto px-4 space-y-6">
        <div class="card flex items-center justify-between py-2 px-5 max-w-xs mx-auto bg-slate-800/50">
            <span class="text-[10px] font-800 text-slate-500 uppercase">Rango:</span>
            <select id="selector-fecha" onchange="filtrarPorFecha(this.value)" class="bg-transparent text-blue-400 text-xs font-800 outline-none cursor-pointer">
                <option value="all">Próximos 7 días</option>
            </select>
        </div>

        <div class="grid grid-cols-2 lg:grid-cols-4 gap-4">
            <div class="card border-l-4 border-l-red-500 text-center">
                <span class="text-[9px] font-800 text-slate-500 uppercase">T. Máx/Mín</span>
                <div class="text-xl font-800"><span id="kpi-temp-max">--</span> / <span id="kpi-temp-min" class="text-blue-400">--</span> <span class="text-xs text-slate-500">°C</span></div>
            </div>
            <div class="card border-l-4 border-l-emerald-500 text-center">
                <span class="text-[9px] font-800 text-slate-500 uppercase">Humedad Máx</span>
                <div class="text-xl font-800"><span id="kpi-hum-max">--</span> <span class="text-xs text-slate-500">%</span></div>
            </div>
            <div class="card border-l-4 border-l-pink-500 text-center">
                <span class="text-[9px] font-800 text-slate-500 uppercase">Delta Mín</span>
                <div class="text-xl font-800"><span id="kpi-delta-min">--</span> <span class="text-xs text-slate-500">°C</span></div>
            </div>
            <div class="card border-l-4 border-l-violet-500 text-center">
                <span class="text-[9px] font-800 text-slate-500 uppercase">Viento Máx</span>
                <div class="text-xl font-800"><span id="kpi-viento-max">--</span> <span class="text-xs text-slate-500">m/s</span></div>
            </div>
        </div>

        <div id="sec-resumen" class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <div class="card"><canvas id="chart-diario"></canvas></div>
            <div class="card"><canvas id="chart-horario"></canvas></div>
        </div>

        <div id="sec-aire" class="hidden space-y-6">
            <div id="model-selector-container" class="flex gap-2 overflow-x-auto no-scrollbar pb-2 justify-center"></div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="card"><canvas id="chart-temp-rocio"></canvas></div>
                <div class="card"><canvas id="chart-delta"></canvas></div>
                <div class="card"><canvas id="chart-humedad"></canvas></div>
                <div class="card"><canvas id="chart-viento"></canvas></div>
            </div>
        </div>

        <p id="footer-sync" class="text-center text-[10px] text-slate-600 font-mono italic">--</p>
    </main>

    <script>
        // --- CONFIGURACIÓN GLOBAL Y ESTADO ---
        const ARCHIVOS_LISTA = ["elida.json", "magliano.json", "chañar.json", "serrano.json", "gomez.json", "villa rossi.json"];
        let charts = {};
        let rawData = null;
        let selectedModel = null;
        let fechaFiltro = "all";
        let seccionActual = "resumen";

        const MODEL_COLORS = { 
            'GFS': '#0212A5', 'OpenMeteo': '#FF5757', 'SMN_WRF': '#D6D306', 
            'MET_Norway': '#00CC96', 'CONSENSO': '#60a5fa' 
        };

        // --- TRADUCCIÓN (Copiada del éxito del gráfico diario) ---
        function traducirDia(label) {
            if (!label) return "";
            const mapeo = {
                'Mon': 'Lun', 'Tue': 'Mar', 'Wed': 'Mié', 'Thu': 'Jue', 
                'Fri': 'Vie', 'Sat': 'Sáb', 'Sun': 'Dom'
            };
            let res = label;
            Object.entries(mapeo).forEach(([ing, esp]) => {
                res = res.replace(ing, esp);
            });
            return res;
        }



        // --- PLUGIN: LÍNEAS PUNTEADAS DIVISORIAS DE DÍAS ---
        const divisorDiasPlugin = {
            id: 'divisorDias',
            afterDraw: (chart) => {
                if (chart.canvas.id === 'chart-diario') return;

                const { ctx, chartArea: { top, bottom }, scales: { x } } = chart;
                const labels = chart.data.labels;
                if (!labels || labels.length === 0) return;

                ctx.save();
                ctx.strokeStyle = 'rgba(71, 85, 105, 0.60)'; // Slate-600 con buena opacidad
                ctx.lineWidth = 1.2;
                ctx.setLineDash([4, 4]); // Línea punteada fija

                const puntosVisibles = x.max - x.min;
                const esVistaGeneral = (puntosVisibles > 48);
                const isFiltered = chart.options.scales.x.isFiltered; // Detecta si es la vista de 1 día

                // --- REGLA EXCLUSIVA PARA LA VISTA DÍA POR DÍA ---
                if (isFiltered) {
                    for (let i = 0; i < labels.length; i++) {
                        const label = labels[i];
                        if (!label) continue;

                        const hora = label.split(' ').pop();
                        const xPos = x.getPixelForValue(i);

                        if (xPos >= chart.chartArea.left && xPos <= chart.chartArea.right) {
                            // En la vista de 1 día, metemos líneas cada 3 horas sí o sí
                            if (/^(00|03|06|09|12|15|18|21):00$/.test(hora) || hora === '0:00') {
                                ctx.beginPath();
                                ctx.moveTo(xPos, top);
                                ctx.lineTo(xPos, bottom);
                                ctx.stroke();
                            }
                        }
                    }
                    ctx.restore();
                    return; // Termina acá para no ejecutar la lógica de 7 días
                }

                // --- LA VISTA DE 7 DÍAS QUEDA EXACTAMENTE IGUAL (NO SE TOCA) ---
                for (let i = 0; i < labels.length; i++) {
                    const label = labels[i];
                    if (!label) continue;

                    const partes = label.split(' ');
                    const hora = partes[partes.length - 1];
                    const xPos = x.getPixelForValue(i);

                    if (xPos >= chart.chartArea.left && xPos <= chart.chartArea.right) {
                        if (esVistaGeneral) {
                            if (hora === '00:00' || hora === '0:00') {
                                ctx.beginPath();
                                ctx.moveTo(xPos, top);
                                ctx.lineTo(xPos, bottom);
                                ctx.stroke();
                            }
                        } else {
                            if (/^(00|06|12|18):00$/.test(hora) || hora === '0:00') {
                                ctx.beginPath();
                                ctx.moveTo(xPos, top);
                                ctx.lineTo(xPos, bottom);
                                ctx.stroke();
                            }
                        }
                    }
                }
                ctx.restore();
            }
        };

        // --- CONFIGURACIÓN EJES X OPTIMIZADA ---
        const getDynamicXConfig = (isFiltered) => ({
            grid: { display: false },
            ticks: {
                color: '#94a3b8',
                font: { size: 10, weight: '600' },
                maxRotation: 0,
                minRotation: 0,
                align: 'center',
                autoSkip: false, // Rompemos el skip automático de Chart.js para mandar nosotros

                callback: function(value, index, values) {
                    const label = this.getLabelForValue(value);
                    if (!label) return undefined;

                    const partes = label.split(' ');
                    const diaId = partes[0]; 
                    const hora = partes[partes.length - 1]; 

                    const nombreDia = diaId.substring(0, 3); 
                    const numeroDia = diaId.substring(3);    
                    const etiquetaDia = `${nombreDia} ${numeroDia}`; 

                    // --- VISTA DÍA POR DÍA ---
                    if (isFiltered) {
                        // Al principio del gráfico (sea la hora que sea) ponemos el día de ancla
                        if (index === 0 || hora === '00:00' || hora === '0:00') {
                            return etiquetaDia;
                        }
                        // Forzamos que se impriman SÍ O SÍ cada 3 horas limpias
                        if (/^(03|06|09|12|15|18|21):00$/.test(hora)) {
                            return hora;
                        }
                        return undefined;
                    }

                    // --- VISTA SEMANAL (7 DÍAS) ---
                    const puntosVisibles = this.chart.scales.x.max - this.chart.scales.x.min;
                    const esVistaGeneral = (puntosVisibles > 48);
                    
                    if (esVistaGeneral) {
                        if (index === 0) return undefined;
                        const prevLabel = this.getLabelForValue(values[index - 1].value);
                        if (diaId !== prevLabel.split(' ')[0]) {
                            return etiquetaDia; 
                        }
                        return undefined;
                    }

                    if (hora === '00:00' || hora === '0:00') return etiquetaDia; 
                    if (/^(06|12|18):00$/.test(hora)) return hora;

                    return undefined; 
                }
            }
        });

        // --- OPCIONES BASE ---
        const baseOptions = {
            responsive: true,
            maintainAspectRatio: false,
            interaction: { mode: 'index', intersect: false },
            plugins: { 
                legend: { labels: { color: '#94a3b8', font: { size: 10, weight: '800' } } },
                tooltip: { enabled: true },
                zoom: {
                    pan: {  
                        enabled: true,
                        mode: 'x',
                        modifierKey: null, 
                        speed: 10, 
                        threshold: 10 
                    },
                    zoom: {
                        wheel: { enabled: true, speed: 0.05 },
                        pinch: { enabled: true },
                        mode: 'x',
                        
                        // --- EL BLOQUEO INFRANQUEABLE DE SENSIVILIDAD ---
                        onZoom: function({chart}) {
                            const xAxis = chart.scales.x;
                            const puntosVisibles = xAxis.max - xAxis.min;
                            const isFiltered = chart.options.scales.x.isFiltered;

                            // SI ES LA VISTA DE UN DÍA: No permitimos que se achique a menos de 16 horas
                            if (isFiltered && puntosVisibles < 16) {
                                chart.options.scales.x.min = xAxis.min;
                                chart.options.scales.x.max = xAxis.min + 16;
                                chart.update('none');
                                return false; // Cancela el zoom violento
                            }
                            
                            // SI ES LA VISTA SE SEMANA: No dejamos que rompa la escala metiendo zoom infinito
                            if (!isFiltered && puntosVisibles < 24) {
                                chart.options.scales.x.min = xAxis.min;
                                chart.options.scales.x.max = xAxis.min + 24;
                                chart.update('none');
                                return false;
                            }
                        },

                        onZoomComplete: ({chart}) => chart.update('none')
                    }
                }
            },
            scales: {
                y: { grid: { color: '#334155' }, ticks: { color: '#94a3b8', font: { size: 10 } } },
                x: getDynamicXConfig(false)
            }
        };

        // --- INICIALIZACIÓN Y CARGA ---
        async function inicializarApp() {
            const selectLote = document.getElementById('selector-lote');
            const infoLotes = await Promise.all(ARCHIVOS_LISTA.map(async f => {
                try {
                    const r = await fetch(`data/${f}`);
                    const j = await r.json();
                    return { file: f, nombre: j.metadata.lote };
                } catch(e) { return null; }
            }));
            
            infoLotes.filter(l => l).forEach(l => {
                const opt = document.createElement('option');
                opt.value = l.file; opt.textContent = l.nombre;
                selectLote.appendChild(opt);
            });

            const ctxs = ['chart-diario', 'chart-horario', 'chart-temp-rocio', 'chart-delta', 'chart-humedad', 'chart-viento'];
            ctxs.forEach(id => {
                const key = id.replace('chart-', '').replace('-rocio', '');
                const type = id === 'chart-diario' || id === 'chart-horario' ? 'bar' : 'line';
                charts[key] = new Chart(document.getElementById(id), { 
                    type, 
                    data: { labels: [], datasets: [] }, 
                    options: JSON.parse(JSON.stringify(baseOptions)),
                    plugins: [divisorDiasPlugin] // Inyectamos el plugin divisor a todos los gráficos
                });
            });

            cambiarLote(selectLote.value);
        }

        async function cambiarLote(archivo) {
            const res = await fetch(`data/${archivo}`);
            rawData = await res.json();
            poblarSelectorFechas();
            actualizarPantalla();
        }

        function poblarSelectorFechas() {
            const select = document.getElementById('selector-fecha');
            select.innerHTML = '<option value="all">Próximos 7 días</option>';
            const mKey = Object.keys(rawData.horario)[0];
            const diasUnicos = [...new Set(rawData.horario[mKey].map(p => p.x.split(' ')[0]))];
            diasUnicos.forEach(f => {
                const d = new Date(f + "T12:00:00");
                const dias = ['Dom', 'Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb'];
                const opt = document.createElement('option');
                opt.value = f; opt.innerText = `${dias[d.getDay()]} ${d.getDate()}`;
                select.appendChild(opt);
            });
        }

        function actualizarPantalla() {
            document.getElementById('sec-resumen').style.display = (seccionActual === 'resumen') ? 'grid' : 'none';
            document.getElementById('sec-aire').style.display = (seccionActual !== 'resumen') ? 'block' : 'none';

            if (seccionActual === "resumen") {
                renderizarResumen();
            } else {
                selectedModel = (seccionActual === 'prueba') ? 'CONSENSO' : (selectedModel || 'OpenMeteo');
                document.getElementById('model-selector-container').style.display = (seccionActual === 'prueba') ? 'none' : 'flex';
                generarSelectorModelos();
                renderizarClima();
            }
            document.getElementById('footer-sync').innerText = `Sync: ${rawData.metadata.actualizado} | Lote: ${rawData.metadata.lote}`;
        }

        // --- RENDERIZADO ---
        function renderizarResumen() {
            // 1. Diario (Precipitación Acumulada)
            charts.diario.data.labels = rawData.diario.labels.map(traducirDia);
            charts.diario.data.datasets = [{ 
                label: 'Lluvia (mm)', 
                data: rawData.diario.data, 
                backgroundColor: '#3b82f6', 
                borderRadius: 5 
            }];
            charts.diario.update();

            // 2. Horario Sincronizado
            const modelos = Object.keys(rawData.horario).filter(m => m !== 'CONSENSO');
            
            const dRef = fechaFiltro === "all" 
                ? rawData.horario['OpenMeteo'] 
                : rawData.horario['OpenMeteo'].filter(p => p.x.startsWith(fechaFiltro));

            const mapaEtiquetas = {};
            const labelsParaEje = dRef.map(p => {
                const dt = new Date(p.x.replace(' ', 'T'));
                const labelTraducido = traducirDia(`${dt.toLocaleDateString('en-US', {weekday:'short'})}${dt.getDate()} ${p.x.split(' ')[1]}`);
                mapaEtiquetas[p.x] = labelTraducido;
                return labelTraducido;
            });

            charts.horario.data.labels = labelsParaEje;

            charts.horario.data.datasets = modelos.map(m => {
                const datosBrutos = (fechaFiltro === "all" 
                    ? rawData.horario[m] 
                    : rawData.horario[m].filter(p => p.x.startsWith(fechaFiltro)));

                return {
                    label: m,
                    backgroundColor: MODEL_COLORS[m],
                    data: labelsParaEje.map(labelEje => {
                        const punto = datosBrutos.find(p => mapaEtiquetas[p.x] === labelEje);
                        return punto ? punto.y : 0;
                    })
                };
            });

            charts.horario.options.scales.x = getDynamicXConfig(fechaFiltro !== "all");
            charts.horario.update();
            actualizarKPIs(dRef);
        }

        function renderizarClima() {
            // El eje de tiempo maestro siempre se basa en OpenMeteo para mantener la consistencia horaria pura
            const ejeReferenciaHoras = fechaFiltro === "all" 
                ? rawData.horario['OpenMeteo'] 
                : rawData.horario['OpenMeteo'].filter(p => p.x.startsWith(fechaFiltro));
            
            const datosModeloActual = rawData.horario[selectedModel];

            // Traducimos las etiquetas horarias del eje maestro
            const labelsTraducidos = ejeReferenciaHoras.map(p => {
                const dt = new Date(p.x.replace(' ', 'T'));
                const labelIngles = `${dt.toLocaleDateString('en-US', {weekday:'short'})}${dt.getDate()} ${p.x.split(' ')[1]}`;
                return traducirDia(labelIngles);
            });

            const datasetBase = (label, data, color, fill = false) => ({
                label, data, borderColor: color, backgroundColor: color + '22', fill, tension: 0.2, pointRadius: 0
            });

            ['temp', 'delta', 'humedad', 'viento'].forEach(key => {
                charts[key].data.labels = labelsTraducidos;
                
                if(key === 'temp') {
                    const dataTemp = ejeReferenciaHoras.map(p => obtenerDatoAproximado(datosModeloActual, p.x, 'temp'));
                    const dataRocio = ejeReferenciaHoras.map(p => obtenerDatoAproximado(datosModeloActual, p.x, 'rocio'));
                    
                    charts[key].data.datasets = [
                        datasetBase('Temp', dataTemp, '#ef4444'), 
                        datasetBase('Rocío', dataRocio, '#06b6d4')
                    ];
                } else if(key === 'delta') {
                    const dataDelta = ejeReferenciaHoras.map(p => {
                        const t = obtenerDatoAproximado(datosModeloActual, p.x, 'temp');
                        const r = obtenerDatoAproximado(datosModeloActual, p.x, 'rocio');
                        return (t - r).toFixed(1);
                    });
                    charts[key].data.datasets = [datasetBase('Delta', dataDelta, '#f472b6', true)];
                } else if(key === 'humedad') {
                    const dataHum = ejeReferenciaHoras.map(p => obtenerDatoAproximado(datosModeloActual, p.x, 'hum'));
                    charts[key].data.datasets = [datasetBase('Hum %', dataHum, '#10b981')];
                } else if(key === 'viento') {
                    const dataViento = ejeReferenciaHoras.map(p => obtenerDatoAproximado(datosModeloActual, p.x, 'viento'));
                    charts[key].data.datasets = [datasetBase('Viento m/s', dataViento, '#8b5cf6')];
                }
                
                charts[key].options.scales.x = getDynamicXConfig(fechaFiltro !== "all");
                charts[key].update();
            });
            
            // Para los KPIs usamos el set de datos maestro mapeado para que no tire errores por falta de registros
            actualizarKPIs(ejeReferenciaHoras.map(p => ({
                temp: obtenerDatoAproximado(datosModeloActual, p.x, 'temp'),
                rocio: obtenerDatoAproximado(datosModeloActual, p.x, 'rocio'),
                hum: obtenerDatoAproximado(datosModeloActual, p.x, 'hum'),
                viento: obtenerDatoAproximado(datosModeloActual, p.x, 'viento')
            })));
        }

        // --- HELPERS ---
        function actualizarKPIs(datos) {
            if (!datos || !datos.length) return;
            const temps = datos.map(p => p.temp), vientos = datos.map(p => p.viento);
            const hums = datos.map(p => p.hum), deltas = datos.map(p => p.temp - p.rocio);
            document.getElementById('kpi-temp-max').innerText = Math.max(...temps).toFixed(1);
            document.getElementById('kpi-temp-min').innerText = Math.min(...temps).toFixed(1);
            document.getElementById('kpi-hum-max').innerText = Math.max(...hums).toFixed(0);
            document.getElementById('kpi-viento-max').innerText = Math.max(...vientos).toFixed(1);
            document.getElementById('kpi-delta-min').innerText = Math.min(...deltas).toFixed(1);
        }

        function obtenerDatoAproximado(datosBrutos, fechaObjetivo, variable) {
            // Intentamos encontrar el punto exacto
            const puntoExacto = datosBrutos.find(p => p.x === fechaObjetivo);
            if (puntoExacto && puntoExacto[variable] !== undefined) {
                return puntoExacto[variable];
            }

            // Si no existe el punto exacto (bache de MET Norway), aproximamos linealmente:
            const tiempoObjetivo = new Date(fechaObjetivo.replace(' ', 'T')).getTime();
            
            // Buscamos el punto anterior más cercano y el posterior más cercano
            let anterior = null;
            let posterior = null;

            for (let p of datosBrutos) {
                const t = new Date(p.x.replace(' ', 'T')).getTime();
                if (t <= tiempoObjetivo) {
                    if (!anterior || t > new Date(anterior.x.replace(' ', 'T')).getTime()) {
                        anterior = p;
                    }
                }
                if (t >= tiempoObjetivo) {
                    if (!posterior || t < new Date(posterior.x.replace(' ', 'T')).getTime()) {
                        posterior = p;
                    }
                }
            }

            // Si encontramos ambos, hacemos una interpolación lineal simple
            if (anterior && posterior && anterior[variable] !== undefined && posterior[variable] !== undefined) {
                const tAnt = new Date(anterior.x.replace(' ', 'T')).getTime();
                const tPost = new Date(posterior.x.replace(' ', 'T')).getTime();
                
                if (tPost === tAnt) return anterior[variable]; // Evitar división por cero
                
                const porcentaje = (tiempoObjetivo - tAnt) / (tPost - tAnt);
                const valorAproximado = anterior[variable] + porcentaje * (posterior[variable] - anterior[variable]);
                return valorAproximado;
            }

            // Si solo hay uno de los lados, devolvemos el que tengamos
            if (anterior && anterior[variable] !== undefined) return anterior[variable];
            if (posterior && posterior[variable] !== undefined) return posterior[variable];

            return 0;
        }
        
        function generarSelectorModelos() {
            const container = document.getElementById('model-selector-container');
            container.innerHTML = '';
            Object.keys(rawData.horario).filter(m => m !== 'CONSENSO').forEach(m => {
                const btn = document.createElement('button');
                btn.innerText = m;
                btn.className = `btn-model ${m === selectedModel ? 'btn-model-active' : ''}`;
                btn.style.borderLeft = `4px solid ${MODEL_COLORS[m]}`;
                btn.onclick = () => { selectedModel = m; actualizarPantalla(); };
                container.appendChild(btn);
            });
        }

        function filtrarPorFecha(val) { fechaFiltro = val; resetAllZooms(); actualizarPantalla(); }

        function verSeccion(sec) {
            seccionActual = sec;
            ['resumen', 'aire', 'prueba'].forEach(t => {
                const el = document.getElementById(`tab-${t}`);
                if(el) el.className = t === sec ? 'btn-tab btn-active flex-1 px-4 py-3 rounded-xl text-[10px] font-800 uppercase' : 'btn-tab bg-slate-800 text-slate-500 flex-1 px-4 py-3 rounded-xl text-[10px] font-800 uppercase';
            });
            actualizarPantalla();
        }

        function resetAllZooms() { Object.values(charts).forEach(c => { if(c.resetZoom) c.resetZoom(); }); }
        window.onload = inicializarApp; 
    </script>
</body>
</html>
