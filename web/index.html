<!DOCTYPE html>
<html lang="es">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta charset="UTF-8">
    <title>AgroClima Pro - Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght=400;600;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0f172a; color: #f1f5f9; font-family: 'Inter', sans-serif; }
        .card { background: #1e293b; border: 1px solid #334155; border-radius: 1rem; padding: 1.25rem; position: relative; }
        .btn-tab { transition: all 0.2s; border: 1px solid transparent; }
        .btn-active { background-color: #3b82f6 !important; color: white !important; border-color: #60a5fa; }
        .btn-model { background: #1e293b; color: #94a3b8; font-size: 10px; font-weight: 800; padding: 8px 12px; border-radius: 8px; border: 1px solid #334155; cursor: pointer; }
        .btn-model-active { color: white; background: #2563eb; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        canvas { touch-action: none; -webkit-tap-highlight-color: transparent; user-select: none; }
    </style>
</head>
<body class="pb-10">

    <div class="sticky top-0 z-50 bg-slate-900/80 backdrop-blur-md border-b border-slate-800 p-4 mb-6">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-4">
                <h1 class="text-xl font-800 italic uppercase text-white">Agro<span class="text-blue-500">Clima</span></h1>
                <select id="selector-lote" onchange="cambiarLote(this.value)" class="bg-slate-800 border border-slate-700 text-blue-400 text-sm font-800 py-1 px-3 rounded-lg outline-none"></select>
                <button onclick="resetAllZooms()" class="bg-slate-700 text-[9px] font-800 px-2 py-1 rounded border border-slate-600 uppercase text-slate-400 hover:text-white">Reset Zoom</button>
            </div>
            <div class="flex gap-2 w-full md:w-auto">
                <button id="tab-resumen" onclick="verSeccion('resumen')" class="btn-tab btn-active flex-1 px-4 py-3 rounded-xl text-[10px] font-800 uppercase tracking-widest">Resumen</button>
                <button id="tab-aire" onclick="verSeccion('aire')" class="btn-tab bg-slate-800 text-slate-500 flex-1 px-4 py-3 rounded-xl text-[10px] font-800 uppercase tracking-widest">Modelos</button>
                <button id="tab-prueba" onclick="verSeccion('prueba')" class="btn-tab bg-slate-800 text-slate-500 flex-1 px-4 py-3 rounded-xl text-[10px] font-800 uppercase tracking-widest text-blue-300">Consenso</button>
            </div>
        </div>
    </div>

    <main class="max-w-6xl mx-auto px-4 space-y-6">
        <div class="card flex items-center justify-between py-2 px-5 max-w-xs mx-auto bg-slate-800/50">
            <span class="text-[10px] font-800 text-slate-500 uppercase">Rango:</span>
            <select id="selector-fecha" onchange="filtrarPorFecha(this.value)" class="bg-transparent text-blue-400 text-xs font-800 outline-none cursor-pointer">
                <option value="all">Próximos 7 días</option>
            </select>
        </div>

        <div class="grid grid-cols-2 lg:grid-cols-4 gap-4">
            <div class="card border-l-4 border-l-red-500 text-center">
                <span class="text-[9px] font-800 text-slate-500 uppercase">T. Máx/Mín</span>
                <div class="text-xl font-800"><span id="kpi-temp-max">--</span> / <span id="kpi-temp-min" class="text-blue-400">--</span> <span class="text-xs text-slate-500">°C</span></div>
            </div>
            <div class="card border-l-4 border-l-emerald-500 text-center">
                <span class="text-[9px] font-800 text-slate-500 uppercase">Humedad Máx</span>
                <div class="text-xl font-800"><span id="kpi-hum-max">--</span> <span class="text-xs text-slate-500">%</span></div>
            </div>
            <div class="card border-l-4 border-l-pink-500 text-center">
                <span class="text-[9px] font-800 text-slate-500 uppercase">Delta Mín</span>
                <div class="text-xl font-800"><span id="kpi-delta-min">--</span> <span class="text-xs text-slate-500">°C</span></div>
            </div>
            <div class="card border-l-4 border-l-violet-500 text-center">
                <span class="text-[9px] font-800 text-slate-500 uppercase">Viento Máx</span>
                <div class="text-xl font-800"><span id="kpi-viento-max">--</span> <span class="text-xs text-slate-500">m/s</span></div>
            </div>
        </div>

        <div id="sec-resumen" class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <div class="card" style="height: 350px;"><canvas id="chart-diario"></canvas></div>
            <div class="card" style="height: 350px;"><canvas id="chart-horario"></canvas></div>
        </div>

        <div id="sec-aire" class="hidden space-y-6">
            <div id="model-selector-container" class="flex gap-2 overflow-x-auto no-scrollbar pb-2 justify-center"></div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="card" style="height: 300px;"><canvas id="chart-temp-rocio"></canvas></div>
                <div class="card" style="height: 300px;"><canvas id="chart-delta"></canvas></div>
                <div class="card" style="height: 300px;"><canvas id="chart-humedad"></canvas></div>
                <div class="card" style="height: 300px;"><canvas id="chart-viento"></canvas></div>
            </div>
        </div>

        <p id="footer-sync" class="text-center text-[10px] text-slate-600 font-mono italic">--</p>
    </main>

    <script>
        // --- CONFIGURACIÓN GLOBAL Y ESTADO ---
        const ARCHIVOS_LISTA = ["elida.json", "magliano.json", "chañar.json", "serrano.json", "gomez.json", "villa rossi.json"];
        let charts = {};
        let rawData = null;
        let selectedModel = null;
        let fechaFiltro = "all";
        let seccionActual = "resumen";

        const MODEL_COLORS = { 
            'GFS': '#0212A5', 'OpenMeteo': '#FF5757', 'SMN_WRF': '#D6D306', 
            'MET_Norway': '#00CC96', 'CONSENSO': '#60a5fa' 
        };

        // --- PLUGIN: DIBUJO DE LÍNEAS EN LAS MEDIANOCHES (00:00) ---
        const divisorDiasPlugin = {
            id: 'divisorDias',
            afterDraw: (chart) => {
                const { ctx, chartArea: { top, bottom }, scales: { x } } = chart;
                if (!x || !chart.data || !chart.data.labels) return;

                const esHorario = chart.data.labels.some(l => l && l.toString().includes(':'));
                if (!esHorario) return;

                ctx.save();
                ctx.strokeStyle = '#475569';
                ctx.setLineDash([4, 4]);
                ctx.lineWidth = 1.5;

                chart.data.labels.forEach((label, index) => {
                    if (label) {
                        const str = label.toString();
                        const match = str.match(/\s+(\d{2}):/);
                        if (match && match[1] === '00') {
                            const xPos = x.getPixelForValue(index);
                            if (xPos >= x.left && xPos <= x.right) {
                                ctx.beginPath();
                                ctx.moveTo(xPos, top);
                                ctx.lineTo(xPos, bottom);
                                ctx.stroke();
                            }
                        }
                    }
                });
                ctx.restore();
            }
        };

        Chart.register(divisorDiasPlugin);

        // --- CONFIGURACIÓN DINÁMICA DEL EJE X CON PRIORIDAD MANUAL ---
        function getDynamicXConfig(isFiltered) {
            return {
                grid: { display: false, drawOnChartArea: false },
                ticks: {
                    maxRotation: 0,
                    minRotation: 0,
                    autoSkip: false, // DESACTIVADO: Ahora controlamos el espacio nosotros manualmente
                    color: '#94a3b8',
                    font: { size: 10, weight: '600' },
                    callback: function(val, index) {
                        const label = this.getLabelForValue(val);
                        if (!label || !label.includes(' ')) return '';

                        const partes = label.split(' ');
                        const fechaStr = partes[0];
                        const horaStr = partes[1];
                        const hora = parseInt(horaStr.split(':')[0]);

                        const diasSemanas = ['Dom', 'Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb'];

                        if (isFiltered) {
                            return (hora % 3 === 0) ? `${hora}:00` : '';
                        }
                        
                        // Calculamos cuántos puntos (horas) entran actualmente en la pantalla
                        const minVisible = this.chart.scales.x.min;
                        const maxVisible = this.chart.scales.x.max;
                        const puntosEnPantalla = maxVisible - minVisible;

                        // PRIORIDAD 1: Las medianoches (00:00) SIEMPRE se muestran, sin importar el zoom.
                        if (hora === 0) {
                            const dt = new Date(fechaStr + "T12:00:00");
                            return `${diasSemanas[dt.getDay()]} ${dt.getDate()}`;
                        }

                        // PRIORIDAD 2: Control manual de horas según el nivel de zoom
                        if (puntosEnPantalla > 120) {
                            // Muy alejado (Vista completa de 7 días): Ocultamos las horas para limpiar el eje
                            return '';
                        } 
                        else if (puntosEnPantalla <= 120 && puntosEnPantalla > 48) {
                            // Zoom medio: Mostramos solo el mediodía (12:00) para dar contexto
                            return (hora === 12) ? '12:00' : '';
                        } 
                        else {
                            // Zoom cercano (Pocos días visibles): Mostramos las horas cada 3 o 6 horas
                            return (hora % 6 === 0) ? `${hora}:00` : '';
                        }
                    }
                }
            };
        }

        // --- CONFIGURACIÓN DE ZOOM NATIVO ---
        const zoomOptions = {
            pan: { enabled: true, mode: 'x' },
            zoom: {
                wheel: { enabled: true },
                pinch: { enabled: true },
                mode: 'x'
            }
        };

        // --- OPCIONES BASE PARA LOS GRÁFICOS ---
        const baseOptions = {
            responsive: true,
            maintainAspectRatio: false,
            // Forzamos a Chart.js a buscar el punto más cercano en el eje X de forma geométrica pura
            interaction: {
                mode: 'index',
                intersect: false,
            },
            scales: {
                x: {
                    offset: false,
                    ...getDynamicXConfig(false)
                },
                y: { 
                    grid: { color: '#1e293b' },
                    ticks: { color: '#64748b', font: { size: 10 } }
                }
            },
            plugins: {
                legend: { display: false },
                tooltip: {
                    enabled: true,
                    position: 'nearest',
                    backgroundColor: '#1e293b',
                    titleColor: '#60a5fa',
                    bodyColor: '#f1f5f9',
                    borderColor: '#334155',
                    borderWidth: 1,
                    padding: 10,
                    displayColors: true,
                    callbacks: {
                        title: function(context) {
                            if (!context || !context[0]) return '';
                            const chart = context[0].chart;
                            const index = context[0].dataIndex;
                            const label = chart.data.labels[index];
                            if (!label) return '';
                            
                            const str = label.toString().trim();
                            const parts = str.match(/\d+/g);
                            if (!parts || parts.length < 3) return str;
                            
                            const dt = new Date(parseInt(parts[0], 10), parseInt(parts[1], 10) - 1, parseInt(parts[2], 10));
                            if (isNaN(dt.getTime())) return str;
                            
                            const dias = ['Dom', 'Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb'];
                            const nombreDia = dias[dt.getDay()];
                            const nroDia = parseInt(parts[2], 10);
                            
                            if (str.includes(':') && parts.length >= 5) {
                                const hora = parts[3].padStart(2, '0');
                                const mins = parts[4].padStart(2, '0');
                                return `${nombreDia} ${nroDia} - ${hora}:${mins} hs`;
                            }
                            
                            return `${nombreDia} ${nroDia}`;
                        }
                    }
                },
                zoom: zoomOptions,
                divisorDias: divisorDiasPlugin
            }
        };

        // --- INICIALIZACIÓN DE LA APP ---
        async function inicializarApp() {
            const selectLote = document.getElementById('selector-lote');
            const infoLotes = await Promise.all(ARCHIVOS_LISTA.map(async f => {
                try {
                    const r = await fetch(`data/${f}`);
                    const j = await r.json();
                    return { file: f, nombre: j.metadata.lote };
                } catch(e) { return null; }
            }));
            
            infoLotes.filter(l => l).forEach(l => {
                const opt = document.createElement('option');
                opt.value = l.file; opt.textContent = l.nombre;
                selectLote.appendChild(opt);
            });

            const ctxs = ['chart-diario', 'chart-horario', 'chart-temp-rocio', 'chart-delta', 'chart-humedad', 'chart-viento'];
            ctxs.forEach(id => {
                const key = id.replace('chart-', '').replace('-rocio', '');
                const type = id === 'chart-diario' || id === 'chart-horario' ? 'bar' : 'line';
                
                // Clonamos las opciones estructurales
                const optConfig = JSON.parse(JSON.stringify(baseOptions));
                
                // Volvemos a inyectar las funciones y objetos nativos que JSON.stringify rompe
                optConfig.scales.x.ticks.callback = baseOptions.scales.x.ticks.callback;
                optConfig.plugins.zoom = zoomOptions;
                optConfig.plugins.divisorDias = divisorDiasPlugin;

                // Forzar offset true solo al de barras diario para que no se recorten los bordes exteriores
                if (id === 'chart-diario') optConfig.scales.x.offset = true;

                charts[key] = new Chart(document.getElementById(id), { 
                    type, 
                    data: { labels: [], datasets: [] }, 
                    options: optConfig
                });
            });

            cambiarLote(selectLote.value);
        }

        async function cambiarLote(archivo) {
            const res = await fetch(`data/${archivo}`);
            rawData = await res.json();
            poblarSelectorFechas();
            actualizarPantalla();
        }

        function poblarSelectorFechas() {
            const select = document.getElementById('selector-fecha');
            select.innerHTML = '<option value="all">Próximos 7 días</option>';
            const mKey = Object.keys(rawData.horario)[0];
            const diasUnicos = [...new Set(rawData.horario[mKey].map(p => p.x.split(' ')[0]))];
            diasUnicos.forEach(f => {
                const d = new Date(f + "T12:00:00");
                const dias = ['Dom', 'Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb'];
                const opt = document.createElement('option');
                opt.value = f; opt.innerText = `${dias[d.getDay()]} ${d.getDate()}`;
                select.appendChild(opt);
            });
        }

        function actualizarPantalla() {
            document.getElementById('sec-resumen').style.display = (seccionActual === 'resumen') ? 'grid' : 'none';
            document.getElementById('sec-aire').style.display = (seccionActual !== 'resumen') ? 'block' : 'none';

            if (seccionActual === "resumen") {
                renderizarResumen();
            } else {
                selectedModel = (seccionActual === 'prueba') ? 'CONSENSO' : (selectedModel || 'OpenMeteo');
                document.getElementById('model-selector-container').style.display = (seccionActual === 'prueba') ? 'none' : 'flex';
                generarSelectorModelos();
                renderizarClima();
            }
            document.getElementById('footer-sync').innerText = `Sync: ${rawData.metadata.actualizado} | Lote: ${rawData.metadata.lote}`;
        }

        // --- RENDERIZADORES SINOÓPTICOS DIRECTOS AL JSON ---
        function renderizarResumen() {
            // 1. Gráfico Diario (Lluvia Acumulada)
            const diasSemanas = ['Dom', 'Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb'];
            charts.diario.data.labels = rawData.diario.labels.map(l => {
                const parts = l.split(' ');
                const d = new Date(parts[1] + "T12:00:00");
                return `${diasSemanas[d.getDay()]} ${d.getDate()}`;
            });
            charts.diario.data.datasets = [{ 
                label: 'Lluvia (mm)', 
                data: rawData.diario.data, 
                backgroundColor: '#3b82f6', 
                borderRadius: 5 
            }];
            charts.diario.update();

            // 2. Gráfico Horario Combinado
            const modelos = Object.keys(rawData.horario).filter(m => m !== 'CONSENSO');
            const dRef = fechaFiltro === "all" 
                ? rawData.horario['OpenMeteo'] 
                : rawData.horario['OpenMeteo'].filter(p => p.x.startsWith(fechaFiltro));

            // SIGUE AL JSON: Pasamos las marcas x crudas directas como identificadores maestros
            charts.horario.data.labels = dRef.map(p => p.x);

            charts.horario.data.datasets = modelos.map(m => {
                const datosBrutos = fechaFiltro === "all" 
                    ? rawData.horario[m] 
                    : rawData.horario[m].filter(p => p.x.startsWith(fechaFiltro));

                return {
                    label: m,
                    backgroundColor: MODEL_COLORS[m],
                    data: dRef.map(ref => {
                        const punto = datosBrutos.find(p => p.x === ref.x);
                        return punto ? punto.y : 0;
                    })
                };
            });

            charts.horario.options.scales.x = {
                ...charts.horario.options.scales.x,
                ...getDynamicXConfig(fechaFiltro !== "all")
            };
            charts.horario.update();
            actualizarKPIs(dRef);
        }

        function renderizarClima() {
            const d = fechaFiltro === "all" 
                ? rawData.horario[selectedModel] 
                : rawData.horario[selectedModel].filter(p => p.x.startsWith(fechaFiltro));
            
            const datasetBase = (label, data, color, fill = false) => ({
                label, data, borderColor: color, backgroundColor: color + '22', fill, tension: 0.2, pointRadius: 0
            });

            ['temp', 'delta', 'humedad', 'viento'].forEach(key => {
                // SIGUE AL JSON: Mapeo temporal idéntico
                charts[key].data.labels = d.map(p => p.x);

                if(key === 'temp') {
                    charts[key].data.datasets = [datasetBase('Temp', d.map(p => p.temp), '#ef4444'), datasetBase('Rocío', d.map(p => p.rocio), '#06b6d4')];
                } else if(key === 'delta') {
                    charts[key].data.datasets = [datasetBase('Delta', d.map(p => (p.temp - p.rocio).toFixed(1)), '#f472b6', true)];
                } else if(key === 'humedad') {
                    charts[key].data.datasets = [datasetBase('Hum %', d.map(p => p.hum), '#10b981')];
                } else if(key === 'viento') {
                    charts[key].data.datasets = [datasetBase('Viento m/s', d.map(p => p.viento), '#8b5cf6')];
                }

                charts[key].options.scales.x = {
                    ...charts[key].options.scales.x,
                    ...getDynamicXConfig(fechaFiltro !== "all")
                };
                charts[key].update();
            });
            actualizarKPIs(d);
        }

        // --- HELPERS GENERALES ---
        function actualizarKPIs(datos) {
            if (!datos || !datos.length) return;
            const temps = datos.map(p => p.temp).filter(v => v !== undefined), vientos = datos.map(p => p.viento).filter(v => v !== undefined);
            const hums = datos.map(p => p.hum).filter(v => v !== undefined), deltas = datos.map(p => p.temp - p.rocio).filter(v => !isNaN(v));
            
            document.getElementById('kpi-temp-max').innerText = temps.length ? Math.max(...temps).toFixed(1) : '--';
            document.getElementById('kpi-temp-min').innerText = temps.length ? Math.min(...temps).toFixed(1) : '--';
            document.getElementById('kpi-hum-max').innerText = hums.length ? Math.max(...hums).toFixed(0) : '--';
            document.getElementById('kpi-viento-max').innerText = vientos.length ? Math.max(...vientos).toFixed(1) : '--';
            document.getElementById('kpi-delta-min').innerText = deltas.length ? Math.min(...deltas).toFixed(1) : '--';
        }

        function generarSelectorModelos() {
            const container = document.getElementById('model-selector-container');
            container.innerHTML = '';
            Object.keys(rawData.horario).filter(m => m !== 'CONSENSO').forEach(m => {
                const btn = document.createElement('button');
                btn.innerText = m;
                btn.className = `btn-model ${m === selectedModel ? 'btn-model-active' : ''}`;
                btn.style.borderLeft = `4px solid ${MODEL_COLORS[m]}`;
                btn.onclick = () => { selectedModel = m; actualizarPantalla(); };
                container.appendChild(btn);
            });
        }

        function filtrarPorFecha(val) { 
            fechaFiltro = val; 
            actualizarPantalla(); 
            setTimeout(resetAllZooms, 50); // Forzamos recalculado de ejes limpios tras cambiar rango
        }

        function verSeccion(sec) {
            seccionActual = sec;
            ['resumen', 'aire', 'prueba'].forEach(t => {
                const el = document.getElementById(`tab-${t}`);
                if(el) el.className = t === sec ? 'btn-tab btn-active flex-1 px-4 py-3 rounded-xl text-[10px] font-800 uppercase tracking-widest' : 'btn-tab bg-slate-800 text-slate-500 flex-1 px-4 py-3 rounded-xl text-[10px] font-800 uppercase tracking-widest';
            });
            actualizarPantalla();
        }

        function resetAllZooms() { 
            Object.values(charts).forEach(c => { if(c.resetZoom) c.resetZoom(); }); 
        }

        window.onload = inicializarApp; 
    </script>
</body>
</html>
